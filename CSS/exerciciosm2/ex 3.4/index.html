<!DOCTYPE html>
<html lang="pt-BR">




<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Escreva seu CSS Aqui */
    div.flag {
      background-color: #ce1126;
      width: 900px;
      height: 600px;
      position: relative;
    }




    div {
      background-color: #002868;
      width: 900px;
      height: 250px;
      position: absolute; top: 120px;
    }


    div.flag > p {
      font-size: 50px;
      text-align: center;
      color: white;
    }


    div div p {
      background-color: #ffffff;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      position: relative; left: 360px;
      position: relative; bottom: 95px;
      font-size: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }




  </style>
</head>




<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>




</html>
